name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            arch_name: x64
          - goarch: arm64
            arch_name: arm64
          - goarch: "386"
            arch_name: x86

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install rsrc
        run: go install github.com/akavel/rsrc@latest

      - name: Generate resource file
        run: rsrc -manifest iocmonitor.manifest -arch ${{ matrix.goarch }} -o rsrc_windows_${{ matrix.goarch }}.syso

      - name: Build
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-H windowsgui -s -w" -o iocmonitor-${{ matrix.arch_name }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iocmonitor-${{ matrix.arch_name }}
          path: iocmonitor-${{ matrix.arch_name }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/iocmonitor-x64/iocmonitor-x64.exe
            artifacts/iocmonitor-arm64/iocmonitor-arm64.exe
            artifacts/iocmonitor-x86/iocmonitor-x86.exe
